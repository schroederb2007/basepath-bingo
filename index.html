<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basepath Bingo</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap');

    body {
      font-family: 'Lato', Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #fafafa;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .card {
      background: #f2f2f2;
      border-radius: 12px;
      padding: 20px;
      width: fit-content;
      margin: 20px auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .join-box {
      max-width: 420px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      text-align: left;
    }

    .join-box label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 700;
    }

    .join-box input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
      border: 1px solid #bbb;
      border-radius: 8px;
    }

    .join-box button,
    .topbar button {
      padding: 10px 16px;
      border: none;
      background: #333;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    .join-box button {
      margin-top: 16px;
      width: 100%;
    }

    .topbar {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 10px 0 20px;
      flex-wrap: wrap;
    }

    .status {
      margin: 10px 0 0;
      font-size: 14px;
      color: #444;
    }

    .winner-banner {
      display: none;
      max-width: 700px;
      margin: 0 auto 20px;
      padding: 14px 18px;
      border-radius: 10px;
      background: #dff3df;
      color: #1f5f1f;
      font-weight: 700;
    }

    .section {
      margin: 30px auto;
      padding: 20px;
      background: #f2f2f2;
      border-radius: 10px;
      width: fit-content;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .label {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 15px;
      color: #333;
    }

    .board {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
    }

    .column {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .colA { margin-top: 0px; }
    .colB { margin-top: 40px; }
    .colC { margin-top: 0px; }
    .colD { margin-top: 40px; }
    .colE { margin-top: 0px; }

    .square {
      border: 1px solid #333;
      width: 110px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 5px;
      background: #ddd;
      opacity: 0.4;
      font-size: 12px;
      position: relative;
      box-sizing: border-box;
    }

    .available {
      background: #4da6ff;
      color: white;
      opacity: 1;
      cursor: pointer;
    }

    .marked {
      background: #28a745;
      color: white;
      opacity: 1;
    }

    .line {
      position: absolute;
      height: 2px;
      background: #333;
      transform-origin: left center;
      pointer-events: none;
    }

    .hidden {
      display: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .modal-content {
      background: white;
      padding: 20px;
      max-width: 420px;
      border-radius: 10px;
      text-align: left;
      width: 100%;
    }

    .close {
      float: right;
      cursor: pointer;
      font-weight: bold;
    }

    @media (max-width: 700px) {
      .board {
        gap: 12px;
      }

      .column {
        gap: 6px;
      }

      .square {
        width: 70px;
        height: 50px;
        font-size: 9px;
      }

      .colB { margin-top: 20px; }
      .colD { margin-top: 20px; }

      .section {
        padding: 10px;
      }

      .label {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

<div id="joinScreen" class="join-box">
  <h2>Join a Game</h2>

  <label for="playerName">Your name</label>
  <input id="playerName" type="text" placeholder="Enter Name">

  <label for="gameCode">Game code</label>
  <input id="gameCode" type="text" placeholder="ex. GoBrewers!">

  <button id="joinBtn">Join Game</button>
  <div class="status" id="joinStatus"></div>
</div>

<div id="appScreen" class="hidden">
  <h1>Basepath Bingo</h1>

  <div class="topbar">
    <button onclick="openRules()">Rules</button>
    <button id="leaveBtn">Leave Game</button>
  </div>

  <div id="gameInfo" class="card"></div>
  <div id="winnerBanner" class="winner-banner"></div>

  <div class="section">
    <div class="label">Away</div>
    <div id="boardAway" class="board"></div>
  </div>

  <div class="section">
    <div class="label">Home</div>
    <div id="boardHome" class="board"></div>
  </div>
</div>

<div id="rulesModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeRules()">✖</span>
    <h3>How to Play</h3>
    <p>Click available squares to advance from left to right.</p>
    <p>Only the first column is available at the start.</p>
    <p>Marking a square unlocks connected options in the next column.</p>
    <p>Be the first to mark a square in the final column.</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
  import {
    getAuth,
    signInAnonymously
  } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
  import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    updateDoc,
    onSnapshot,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

  // PASTE YOUR FIREBASE CONFIG HERE
  const firebaseConfig = {
  apiKey: "AIzaSyB85e6C6lwFvI7KZCs5w1ay3IKsjSOHLQY",
  authDomain: "basepath-bingo.firebaseapp.com",
  projectId: "basepath-bingo",
  storageBucket: "basepath-bingo.firebasestorage.app",
  messagingSenderId: "697942367910",
  appId: "1:697942367910:web:7ff1d58aad6aff3fec9e67",
  measurementId: "G-M9P3W75CM5"
};


  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const labels = [
    "K Swing","K Called","Walk","Single Left","Single Center","Single Right",
    "Single Infield","Double","Triple","Home Run","Flyout Left","Flyout Center",
    "Flyout Right","Groundout 6-3","Groundout 4-3","Groundout 5-3",
    "Groundout 1-3","Groundout 3-1","Unassisted 1B","Unassisted 2B",
    "Unassisted 3B","Unassisted SS","Double Play","Stolen Base","Error",
    "Sac Fly","Sac Bunt","HBP","Wild Pitch","Caught Stealing","Intentional Walk"
  ];

  const columns = ["A","B","C","D","E"];
  const columnSizes = { A:5, B:4, C:5, D:4, E:5 };

  let currentGameCode = "";
  let currentPlayerName = "";
  let currentUid = "";
  let unsubscribeGame = null;
  let gameState = null;

  function openRules() {
    document.getElementById("rulesModal").style.display = "flex";
  }

  function closeRules() {
    document.getElementById("rulesModal").style.display = "none";
  }

  window.openRules = openRules;
  window.closeRules = closeRules;

  function normalizeGameCode(value) {
    return value.trim().toLowerCase().replace(/\s+/g, "-");
  }

  function xmur3(str) {
    let h = 1779033703 ^ str.length;
    for (let i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    return function() {
      h = Math.imul(h ^ (h >>> 16), 2246822507);
      h = Math.imul(h ^ (h >>> 13), 3266489909);
      return (h ^= h >>> 16) >>> 0;
    };
  }

  function mulberry32(a) {
    return function() {
      let t = a += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function seededShuffle(arr, seedString) {
    const seedFn = xmur3(seedString);
    const rand = mulberry32(seedFn());
    const copy = [...arr];

    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }

    return copy;
  }

  function buildBoardTemplate() {
    const squares = [];

    columns.forEach(col => {
      for (let i = 1; i <= columnSizes[col]; i++) {
        squares.push({ id: col + i, col, depends: [] });
      }
    });

    function connect(from, to) {
      squares.find(s => s.id === to).depends.push(from);
    }

    connect("A1","B1");
    connect("A2","B1"); connect("A2","B2");
    connect("A3","B2"); connect("A3","B3");
    connect("A4","B3"); connect("A4","B4");
    connect("A5","B4");

    connect("B1","C1"); connect("B1","C2");
    connect("B2","C2"); connect("B2","C3");
    connect("B3","C3"); connect("B3","C4");
    connect("B4","C4"); connect("B4","C5");

    connect("C1","D1");
    connect("C2","D1"); connect("C2","D2");
    connect("C3","D2"); connect("C3","D3");
    connect("C4","D3"); connect("C4","D4");
    connect("C5","D4");

    connect("D1","E1"); connect("D1","E2");
    connect("D2","E2"); connect("D2","E3");
    connect("D3","E3"); connect("D3","E4");
    connect("D4","E4"); connect("D4","E5");

    return squares;
  }

  function buildBoardFromSeed(seed) {
    const template = buildBoardTemplate();
    const shuffled = seededShuffle(labels, seed);

    return template.map((sq, i) => ({
      ...sq,
      label: shuffled[i]
    }));
  }

  function isAvailable(square, markedIds) {
    if (square.col === "A") return true;
    return square.depends.some(id => markedIds.includes(id));
  }

  function getWinningBoard(markedIds, boardSquares) {
    return boardSquares.some(s => s.col === "E" && markedIds.includes(s.id));
  }

  function renderGameInfo(players = {}) {
    const names = Object.values(players).map(p => p.name).filter(Boolean);
    const info = document.getElementById("gameInfo");
    info.innerHTML = `
      <div><strong>Game:</strong> ${currentGameCode}</div>
      <div><strong>You:</strong> ${currentPlayerName}</div>
      <div><strong>Players:</strong> ${names.length ? names.join(", ") : "Just you"}</div>
    `;
  }

  function renderWinnerBanner(game) {
    const banner = document.getElementById("winnerBanner");

    if (game.winnerName) {
      banner.style.display = "block";
      banner.textContent = `${game.winnerName} won this game.`;
    } else {
      banner.style.display = "none";
      banner.textContent = "";
    }
  }

  function drawLines(boardEl, boardIdPrefix, boardSquares, markedIds) {
    boardSquares.forEach(sq => {
      if (!markedIds.includes(sq.id)) return;

      const fromEl = document.getElementById(boardIdPrefix + sq.id);
      if (!fromEl) return;

      boardSquares.forEach(target => {
        if (!target.depends.includes(sq.id)) return;

        const toEl = document.getElementById(boardIdPrefix + target.id);
        if (!toEl) return;

        const line = document.createElement("div");
        line.className = "line";

        const r1 = fromEl.getBoundingClientRect();
        const r2 = toEl.getBoundingClientRect();
        const rb = boardEl.getBoundingClientRect();

        const x1 = r1.right - rb.left;
        const y1 = r1.top + r1.height / 2 - rb.top;
        const x2 = r2.left - rb.left;
        const y2 = r2.top + r2.height / 2 - rb.top;

        const length = Math.hypot(x2 - x1, y2 - y1);
        const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;

        line.style.width = length + "px";
        line.style.left = x1 + "px";
        line.style.top = y1 + "px";
        line.style.transform = `rotate(${angle}deg)`;

        boardEl.appendChild(line);
      });
    });
  }

  function renderBoard(boardElementId, boardIdPrefix, boardSquares, markedIds, clickHandler, disableClicks) {
    const boardEl = document.getElementById(boardElementId);
    boardEl.innerHTML = "";

    const colMap = { A:[], B:[], C:[], D:[], E:[] };
    boardSquares.forEach(s => colMap[s.col].push(s));

    columns.forEach(col => {
      const colDiv = document.createElement("div");
      colDiv.className = "column col" + col;

      colMap[col].forEach(sq => {
        const div = document.createElement("div");
        div.className = "square";
        div.id = boardIdPrefix + sq.id;

        if (markedIds.includes(sq.id)) {
          div.classList.add("marked");
        } else if (isAvailable(sq, markedIds) && !disableClicks) {
          div.classList.add("available");
        }

        div.innerText = sq.label;

        if (!disableClicks) {
          div.onclick = () => clickHandler(sq.id);
        }

        colDiv.appendChild(div);
      });

      boardEl.appendChild(colDiv);
    });

    drawLines(boardEl, boardIdPrefix, boardSquares, markedIds);
  }

  async function joinGame() {
    const statusEl = document.getElementById("joinStatus");
    const name = document.getElementById("playerName").value.trim();
    const code = normalizeGameCode(document.getElementById("gameCode").value);

    if (!name || !code) {
      statusEl.textContent = "Enter your name and a game code.";
      return;
    }

    statusEl.textContent = "Joining game...";

    try {
      const authResult = await signInAnonymously(auth);
      currentUid = authResult.user.uid;
      currentPlayerName = name;
      currentGameCode = code;

      const gameRef = doc(db, "games", code);
      const playerRef = doc(db, "games", code, "players", currentUid);

      const gameSnap = await getDoc(gameRef);

      if (!gameSnap.exists()) {
        const awaySeed = `${code}-away`;
        const homeSeed = `${code}-home`;

        await setDoc(gameRef, {
          code,
          awaySeed,
          homeSeed,
          winnerId: null,
          winnerName: null,
          createdBy: currentUid,
          createdAt: serverTimestamp()
        });
      }

      await setDoc(playerRef, {
        name,
        joinedAt: serverTimestamp(),
        awayMarked: [],
        homeMarked: [],
        hasWon: false
      });

      document.getElementById("joinScreen").classList.add("hidden");
      document.getElementById("appScreen").classList.remove("hidden");

      startListening();
    } catch (error) {
      statusEl.textContent = "Could not join game. Check your Firebase config.";
      console.error(error);
    }
  }

  function startListening() {
    if (unsubscribeGame) unsubscribeGame();

    const gameRef = doc(db, "games", currentGameCode);

    unsubscribeGame = onSnapshot(gameRef, async (gameSnap) => {
      if (!gameSnap.exists()) return;

      const game = gameSnap.data();
      gameState = game;

      const awayBoard = buildBoardFromSeed(game.awaySeed);
      const homeBoard = buildBoardFromSeed(game.homeSeed);

      const playersData = {};
      const gamePlayersRefPrefix = `games/${currentGameCode}/players/`;

      // Light-weight approach for now:
      // fetch each known player using embedded map if you add one later,
      // or just render current player info.
      // To keep this single-file simple, we only show current player and winner state here.

      renderGameInfo(playersData);
      renderWinnerBanner(game);

      const myPlayerRef = doc(db, "games", currentGameCode, "players", currentUid);

      onSnapshot(myPlayerRef, (playerSnap) => {
        if (!playerSnap.exists()) return;

        const player = playerSnap.data();
        const gameOver = !!game.winnerId;

        renderBoard(
          "boardAway",
          "away-",
          awayBoard,
          player.awayMarked || [],
          (squareId) => handleSquareClick("awayMarked", awayBoard, squareId),
          gameOver
        );

        renderBoard(
          "boardHome",
          "home-",
          homeBoard,
          player.homeMarked || [],
          (squareId) => handleSquareClick("homeMarked", homeBoard, squareId),
          gameOver
        );
      });
    });
  }

  async function handleSquareClick(fieldName, boardSquares, squareId) {
    if (!gameState || gameState.winnerId) return;

    const playerRef = doc(db, "games", currentGameCode, "players", currentUid);
    const playerSnap = await getDoc(playerRef);
    if (!playerSnap.exists()) return;

    const player = playerSnap.data();
    const markedIds = [...(player[fieldName] || [])];
    const square = boardSquares.find(s => s.id === squareId);

    if (!square) return;
    // toggle behavior
if (markedIds.includes(squareId)) {
  // remove it (undo)
  const index = markedIds.indexOf(squareId);
  markedIds.splice(index, 1);

  await updateDoc(playerRef, {
    [fieldName]: markedIds
  });

  return;
}
    if (!isAvailable(square, markedIds)) return;

    markedIds.push(squareId);

    const updates = { [fieldName]: markedIds };
    const awayBoard = buildBoardFromSeed(gameState.awaySeed);
    const homeBoard = buildBoardFromSeed(gameState.homeSeed);

    const awayWin = getWinningBoard(
      fieldName === "awayMarked" ? markedIds : (player.awayMarked || []),
      awayBoard
    );

    const homeWin = getWinningBoard(
      fieldName === "homeMarked" ? markedIds : (player.homeMarked || []),
      homeBoard
    );

    await updateDoc(playerRef, updates);

    if (awayWin || homeWin) {
      const gameRef = doc(db, "games", currentGameCode);
      const freshGame = await getDoc(gameRef);

      if (freshGame.exists() && !freshGame.data().winnerId) {
        await updateDoc(gameRef, {
          winnerId: currentUid,
          winnerName: currentPlayerName
        });

        await updateDoc(playerRef, {
          hasWon: true
        });
      }
    }
  }

  function leaveGame() {
    if (unsubscribeGame) unsubscribeGame();
    location.reload();
  }

  document.getElementById("joinBtn").addEventListener("click", joinGame);
  document.getElementById("leaveBtn").addEventListener("click", leaveGame);
</script>

</body>
</html>
